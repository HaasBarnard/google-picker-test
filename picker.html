<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Google Picker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
  <h3>Google Picker</h3>
  <button id="authBtn" style="display:none">Authorize & Pick</button>

  <script>
    // ================= CONFIG =================

    const CLIENT_ID = "YOUR_OAUTH_CLIENT_ID.apps.googleusercontent.com";
    const API_KEY   = "YOUR_API_KEY";
    const APP_ID    = "YOUR_PROJECT_NUMBER";

    const SCOPES = "https://www.googleapis.com/auth/drive.readonly";

    // Custom scheme your Android app listens for
    const ANDROID_REDIRECT = "myapp://picker";

    // ==========================================

    let tokenClient;
    let accessToken = null;
    let pickerReady = false;
    let gisReady = false;

    function maybeEnableButton() {
      if (pickerReady && gisReady) {
        document.getElementById("authBtn").style.display = "block";
      }
    }

    // ---------- Google APIs ----------
    function gapiLoaded() {
      gapi.load("client:picker", async () => {
        await gapi.client.load(
          "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"
        );
        pickerReady = true;
        maybeEnableButton();
      });
    }

    // ---------- Google Identity Services ----------
    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (tokenResponse) => {
          if (tokenResponse.error) {
            console.error(tokenResponse);
            return;
          }
          accessToken = tokenResponse.access_token;
          createPicker();
        }
      });
      gisReady = true;
      maybeEnableButton();
    }

    // ---------- Picker ----------
    function createPicker() {
      const view = new google.picker.View(google.picker.ViewId.DOCS);
      view.setMimeTypes(
        "application/vnd.google-apps.presentation"
      );

      const picker = new google.picker.PickerBuilder()
        .setAppId(APP_ID)
        .setOAuthToken(accessToken)
        .setDeveloperKey(API_KEY)
        .addView(view)
        .setCallback(pickerCallback)
        .build();

      picker.setVisible(true);
    }

    function pickerCallback(data) {
      if (data.action === google.picker.Action.PICKED) {
        const doc = data.docs[0];
        const fileId = doc.id;

        // Redirect back to Android
        window.location.href =
          `${ANDROID_REDIRECT}?fileId=${encodeURIComponent(fileId)}`;
      }
    }

    // ---------- Button ----------
    document.getElementById("authBtn").onclick = () => {
      tokenClient.requestAccessToken({ prompt: "consent" });
    };
  </script>

  <!-- Required scripts -->
  <script async defer
    src="https://apis.google.com/js/api.js"
    onload="gapiLoaded()"></script>

  <script async defer
    src="https://accounts.google.com/gsi/client"
    onload="gisLoaded()"></script>
</body>
</html>
