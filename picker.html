<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Google Picker Test</title>

<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://apis.google.com/js/api.js"></script>

<script>

let accessToken = null

function loadPickerLibraries() {
    gapi.load('picker', () => {
        console.log("Picker library loaded")
    })
}

function authenticate() {

    const clientId = document.getElementById("clientId").value

    const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: "https://www.googleapis.com/auth/drive.readonly",
        callback: (response) => {

            accessToken = response.access_token
            console.log("Access token received")

            createPicker()
        }
    })

    tokenClient.requestAccessToken()
}

function createPicker() {

    const apiKey = document.getElementById("apiKey").value
    const projectNumber = document.getElementById("projectNumber").value

    const view = new google.picker.DocsView(google.picker.ViewId.PRESENTATIONS)
        .setMimeTypes("application/vnd.google-apps.presentation")
        .setIncludeFolders(false);

    const picker = new google.picker.PickerBuilder()
        .setDeveloperKey(apiKey)
        .setAppId(projectNumber)
        .setOAuthToken(accessToken)
        .addView(view)
        .setCallback(pickerCallback)
        .build()

    picker.setVisible(true)
}

function pickerCallback(data) {

    if (data.action === google.picker.Action.PICKED) {

        const doc = data.docs[0]

        const result = {
            id: doc.id,
            name: doc.name,
            url: doc.url
        }

        // Send result back to Android
        window.location.href =
            "myapp://picker?data=" +
            encodeURIComponent(JSON.stringify(result))
    }
}

</script>
</head>

<body onload="loadPickerLibraries()">

<h3>Google Picker Test</h3>

<p>API Key</p>
<input id="apiKey" style="width:400px"/>

<p>Client ID</p>
<input id="clientId" style="width:400px"/>

<p>Project Number</p>
<input id="projectNumber" style="width:400px"/>

<br><br>

<button onclick="authenticate()">Authenticate + Open Picker</button>

</body>
</html>
