<!DOCTYPE html>
<html>
<head>
<script src="https://apis.google.com/js/api.js"></script>

<script>

const API_KEY = "AIzaSyC45XGP_NeDe8-nxil7GTIDgZDQsb39nCU";
const APP_ID = "123945608096";

function getToken() {
  const params = new URLSearchParams(window.location.hash.substring(1));
  return params.get("token");
}

function loadPicker() {
  gapi.load('picker', {'callback': createPicker});
}

function createPicker() {

  const token = getToken();

  if (!token) {
    console.error("No token found");
    return;
  }

  const view = new google.picker.DocsView(google.picker.ViewId.PRESENTATIONS)
      .setMimeTypes("application/vnd.google-apps.presentation")
      .setMode(google.picker.DocsViewMode.THUMBNAILS);

  const picker = new google.picker.PickerBuilder()
      .setDeveloperKey(API_KEY)
      .setAppId(APP_ID)
      .setOAuthToken(token)
      .addView(view)
      .setCallback(pickerCallback)
      .build();

  picker.setVisible(true);
}

function pickerCallback(data) {

  if (data.action === google.picker.Action.PICKED) {

    const doc = data.docs[0];

    const result = {
      id: doc.id,
      name: doc.name,
      size: doc.sizeBytes || 0
    };

    const encoded = btoa(JSON.stringify(result));

    window.location.href =
      "myapp://picker?data=" + encodeURIComponent(encoded);
  }
}

</script>
</head>

<body onload="loadPicker()">
Launching picker...
</body>
</html>
